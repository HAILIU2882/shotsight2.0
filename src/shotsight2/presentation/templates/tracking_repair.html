{% extends "base.html" %}
{% block title %}{{ t('tracking.title', locale) }}{% endblock %}
{% block content %}
<p><a href="/videos/{{ video_id }}?locale={{ locale }}">&larr; {{ t('common.back', locale) }}</a></p>
<h1>{{ t('tracking.title', locale) }}</h1>
<div class="card" style="max-width:540px">
  <p class="hint" style="margin-bottom:1rem">{{ t('tracking.instructions', locale) }}</p>
  <form method="post" action="/videos/{{ video_id }}/tracking/submit?locale={{ locale }}">
    <input type="hidden" name="segment_id" value="{{ run_id }}">
    <div class="form-group">
      <label>{{ t('attempts.time', locale) }} (s)
        <input type="number" step="0.01" name="timestamp_seconds" min="0" required>
      </label>
    </div>
    <div class="form-group">
      <label>{{ t('tracking.kind_point', locale) }} / {{ t('tracking.kind_box', locale) }}
        <select name="kind" id="kind-select">
          <option value="point">{{ t('tracking.kind_point', locale) }}</option>
          <option value="box">{{ t('tracking.kind_box', locale) }}</option>
        </select>
      </label>
    </div>
    <div id="point-fields">
      <div class="form-group">
        <label>X <input type="number" step="0.1" name="point_x"></label>
      </div>
      <div class="form-group">
        <label>Y <input type="number" step="0.1" name="point_y"></label>
      </div>
    </div>
    <div id="box-fields" style="display:none">
      <div class="form-group">
        <label>X <input type="number" step="0.1" name="box_x"></label>
      </div>
      <div class="form-group">
        <label>Y <input type="number" step="0.1" name="box_y"></label>
      </div>
      <div class="form-group">
        <label>Width <input type="number" step="0.1" name="box_w"></label>
      </div>
      <div class="form-group">
        <label>Height <input type="number" step="0.1" name="box_h"></label>
      </div>
    </div>
    <button class="btn btn-primary" type="submit">{{ t('tracking.submit', locale) }}</button>
  </form>
</div>
<script>
  document.getElementById('kind-select').addEventListener('change', function() {
    const isBox = this.value === 'box';
    document.getElementById('point-fields').style.display = isBox ? 'none' : '';
    document.getElementById('box-fields').style.display = isBox ? '' : 'none';
  });
</script>
{% endblock %}
